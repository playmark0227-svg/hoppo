<?xml version="1.0" encoding="UTF-8"?>
<!--
  Erika-chan placeholder character (SVG).
  Replace this file with the real illustration when available.
  Keep viewBox="0 0 200 200" so existing layout stays stable.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="エリカちゃん">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8efff"/>
      <stop offset="1" stop-color="#ffe3ec"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b4a2b"/>
      <stop offset="1" stop-color="#3e2a18"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff9fb8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff9fb8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scarf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff87a9"/>
      <stop offset="1" stop-color="#ffb1c8"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#88c9f2"/>
      <stop offset="1" stop-color="#4fa8de"/>
    </linearGradient>
  </defs>

  <!-- soft halo background (subtle) -->
  <circle cx="100" cy="100" r="92" fill="url(#bg)" opacity="0.55"/>

  <!-- coat / body -->
  <path d="M48 178 C54 140 72 128 100 128 C128 128 146 140 152 178 Z"
        fill="url(#coat)" stroke="#2d7cb4" stroke-width="2.5"/>
  <!-- coat buttons -->
  <circle cx="100" cy="150" r="3" fill="#fff"/>
  <circle cx="100" cy="164" r="3" fill="#fff"/>

  <!-- scarf -->
  <path d="M62 128 C78 140 122 140 138 128 L140 142 C122 152 78 152 60 142 Z"
        fill="url(#scarf)" stroke="#c85775" stroke-width="2"/>
  <path d="M132 140 L148 170 L138 172 L128 146 Z" fill="#ff87a9" stroke="#c85775" stroke-width="2"/>

  <!-- neck -->
  <rect x="92" y="118" width="16" height="14" rx="6" fill="#ffe0cf"/>

  <!-- hair back -->
  <path d="M55 96 C55 60 72 42 100 42 C128 42 145 60 145 96 L145 130 L55 130 Z"
        fill="url(#hair)"/>

  <!-- face -->
  <ellipse cx="100" cy="96" rx="38" ry="42" fill="#ffe5d1"/>
  <!-- hair front bangs -->
  <path d="M63 78 C70 58 90 48 100 48 C110 48 128 58 137 78 C130 74 124 74 120 76 C116 68 108 64 100 64 C90 66 82 72 80 78 C74 74 68 75 63 78 Z"
        fill="url(#hair)"/>

  <!-- side hair -->
  <path d="M60 96 C58 118 62 130 72 134 L70 120 C66 112 64 104 62 96 Z" fill="url(#hair)"/>
  <path d="M140 96 C142 118 138 130 128 134 L130 120 C134 112 136 104 138 96 Z" fill="url(#hair)"/>

  <!-- cheeks -->
  <ellipse cx="78" cy="104" rx="8" ry="5" fill="url(#cheek)"/>
  <ellipse cx="122" cy="104" rx="8" ry="5" fill="url(#cheek)"/>

  <!-- eyes (cute closed smile) -->
  <g fill="none" stroke="#3a3651" stroke-width="3.5" stroke-linecap="round">
    <path d="M82 93 C85 98 91 98 94 93"/>
    <path d="M106 93 C109 98 115 98 118 93"/>
  </g>
  <!-- eye sparkles -->
  <circle cx="88" cy="95" r="1.3" fill="#fff"/>
  <circle cx="112" cy="95" r="1.3" fill="#fff"/>

  <!-- mouth -->
  <path d="M94 112 Q100 118 106 112" fill="none" stroke="#3a3651" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M96 112 Q100 115 104 112" fill="#ff87a9"/>

  <!-- hair ribbon (pink) -->
  <g transform="translate(76 56) rotate(-10)">
    <path d="M0 0 C-10 -4 -14 4 -10 10 C-4 14 4 10 6 4 Z" fill="#ff87a9" stroke="#c85775" stroke-width="1.5"/>
    <path d="M6 4 C16 0 20 8 16 14 C10 18 2 14 0 8 Z" fill="#ff87a9" stroke="#c85775" stroke-width="1.5"/>
    <circle cx="3" cy="7" r="3" fill="#ffb1c8" stroke="#c85775" stroke-width="1"/>
  </g>

  <!-- tiny snow sparkles around -->
  <g fill="#fff" opacity="0.9">
    <circle cx="30" cy="30" r="2"/>
    <circle cx="170" cy="44" r="1.6"/>
    <circle cx="168" cy="90" r="2"/>
    <circle cx="34" cy="112" r="1.6"/>
    <circle cx="22" cy="60" r="1.3"/>
  </g>
</svg>
